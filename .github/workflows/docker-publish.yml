name: Playwright Tests (Enterprise Docker CI)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build unique image name from commit SHA
      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> $GITHUB_ENV

      # 3. Log in to GitHub Container Registry
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t $IMAGE .

      # 5. Run Playwright tests inside container
      - name: Run tests in Docker
        run: docker run --rm --shm-size=1g -e CI=true $IMAGE

      # 6. Push image only if tests passed
      - name: Push Docker image
        run: docker push $IMAGE
